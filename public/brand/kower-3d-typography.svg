      <stop offset="0.22" stop-color="#191A17"/>
      <stop offset="0.52" stop-color="#323128"/>
      <stop offset="0.78" stop-color="#0E0F0D"/>
      <stop offset="1" stop-color="#4B4439"/>
    </linearGradient>
    <linearGradient id="bevel" x1="90" y1="86" x2="1700" y2="356" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#BEB19C"/>
      <stop offset="0.16" stop-color="#302A22"/>
      <stop offset="0.36" stop-color="#E6DAC8"/>
      <stop offset="0.55" stop-color="#1A1A17"/>
      <stop offset="0.74" stop-color="#9D8F79"/>

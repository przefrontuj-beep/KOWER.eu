    <path d="M42 172H160M83 220H184M71 280H172M754 172H865M756 226H884M1078 172H1190M1320 166H1418M1322 220H1416M1516 174H1608M1518 232H1612" stroke="#D8C6A8" stroke-opacity="0.24" stroke-width="5"/>
    <path d="M486 116C525 158 529 277 487 352" stroke="#62B724" stroke-width="8" stroke-linecap="round" opacity="0.68"/>

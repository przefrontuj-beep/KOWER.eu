<svg width="1950" height="520" viewBox="0 0 1950 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Trójwymiarowy napis Kower</title>
  <desc id="desc">Ciemny, metaliczny napis KOWER z subtelnymi zielonymi akcentami i głębią 3D.</desc>
  <defs>
    <linearGradient id="face" x1="900" y1="72" x2="900" y2="388" gradientUnits="userSpaceOnUse">
